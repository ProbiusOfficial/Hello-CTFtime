name: 添加比赛
description: 在Hello-CTF赛事日历以及Hello-CTFtime赛事信息中添加比赛信息。注意，项目接受的比赛信息仅会展示在国内赛事中，国际赛事请在CTFtime上提交。*我们正在测试基于llm模型的赛事信息提取功能，如果您在使用的时候遇到问题，请联系我们(QQ群:590430891)。*
title: "<添加比赛>"
labels: []
assignees:
  - ProbiusOfficial
body:
  - type: textarea
    id: matchInformationText
    attributes:
      label: "赛事信息"
      description: "请在下方的文本框中粘贴赛事相关的信息。模型会提取为：比赛名称、比赛地址（URL）、比赛开始/结束时间、比赛详细说明。内容尽量完整，便于生成准确的 detail 字段。"
      placeholder: "请至少包含：比赛名称、官网或报名链接、比赛起止时间；并补充主办方、报名方式、群号、参赛对象等说明。可直接粘贴宣传文案或海报 OCR 文本（暂不支持自动识别图片）。"
